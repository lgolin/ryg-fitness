<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RYG Fitness - Friendly classes for women, in the heart of Tralee</title>
<meta name="description" content="Friendly fitness classes for women in Tralee - Pilates, Total Body Circuits, Mature Movers and Personal Training with Janet Slye. At your own pace, always." />
<meta name="theme-color" content="#C66A6E" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --serif: "Instrument Serif", "Times New Roman", serif;
    --sans: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: var(--sans);
    background: #EFE8D6;
    color: #2E3530;
    -webkit-font-smoothing: antialiased;
    scroll-behavior: smooth;
  }
  body {
    overflow-x: hidden;
  }
  .container {
    max-width: 1240px;
    margin: 0 auto;
    padding: 0 32px;
  }
  a:hover { opacity: 0.85; }
  button { font-family: inherit; }
  iframe { display: block; }

  .classes-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }
  .classes-grid > article:last-child {
    grid-column: 1 / -1;
  }

  .words-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 880px) {
    .container { padding: 0 22px; }
    .nav-links { display: none !important; }
    .hide-on-mobile { display: none !important; }

    .classes-grid { grid-template-columns: 1fr; }
    .classes-grid > article:last-child { grid-column: auto; }
    .words-grid { grid-template-columns: 1fr; }

    #welcome-grid, #about-grid, #faq-grid, #location-grid, #footer-grid {
      grid-template-columns: 1fr !important;
      gap: 36px !important;
    }
    .schedule-grid { grid-template-columns: 1fr !important; }
    .schedule-row {
      grid-template-columns: 1fr auto !important;
    }
    .schedule-row > :nth-child(2) { display: none; }
    .schedule-row > :nth-child(3) { grid-column: 2; }

    .mobile-fab { display: flex !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/website-v4-atoms.jsx"></script>
<script type="text/babel" src="src/website-v4-sections-1.jsx"></script>
<script type="text/babel" src="src/website-v4-sections-2.jsx"></script>
<script type="text/babel" src="src/website-v4-app.jsx"></script>
</body>
</html>
